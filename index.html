<!DOCTYPE html>
<link rel="icon" href="./favicon.png" sizes="500x500" />
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire 3D</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #56575d; font-family: 'Arial', sans-serif; user-select: none;
            touch-action: none;
        }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* Start Screen Portal Overlay */
        #launcher-screen {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background: radial-gradient(circle, #2c3e50 0%, #0c0f1d 100%);
            display: flex; justify-content: center; align-items: center; color: white;
            text-align: center; cursor: pointer; z-index: 20;
        }
        .start-btn {
            background: linear-gradient(90deg, #ff6d4b 0%, #f36d4f 100%);
            color: white; border: none; padding: 18px 50px; font-size: 22px;
            font-weight: bold; cursor: pointer; border-radius: 30px; margin-top: 20px;
            box-shadow: 0 5px 20px rgba(255,109,75,0.4); text-transform: uppercase;
        }

        /* Tactical HUD Displays */
        #hud-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 20, 30, 0.9); color: #fff; padding: 12px;
            border-left: 4px solid #ff6d4b; border-radius: 4px; pointer-events: none; z-index: 5;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #89be01; opacity: 0.9;
        }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }

        /* HP Bar */
        #hp-wrapper {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 260px; background: rgba(0,0,0,0.6); padding: 4px; border: 2px solid #fff; border-radius: 4px; z-index: 5;
        }
        #hp-bar { width: 100%; height: 12px; background: #89be01; transition: width 0.1s; }
        #hp-text { position: absolute; width: 100%; text-align: center; top: 2px; font-size: 11px; color: white; font-weight: bold; font-family: monospace; }

        /* Victory Screen Overlay */
        #victory-screen {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background: rgba(10, 15, 25, 0.9);
            display: none; justify-content: center; align-items: center; color: white;
            text-align: center; z-index: 30;
        }
        .victory-btn {
            background: linear-gradient(90deg, #89be01 0%, #6da000 100%);
            color: white; border: none; padding: 15px 45px; font-size: 20px;
            font-weight: bold; cursor: pointer; border-radius: 30px; margin-top: 20px;
            box-shadow: 0 5px 20px rgba(137,190,1,0.4); text-transform: uppercase;
        }

        /* GAME CONTROLLER UI LAYOUT */
        .touch-zone { position: absolute; bottom: 30px; z-index: 10; user-select: none; }
        #joystick-bound {
            left: 40px; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1); border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        #joystick-thumb {
            width: 50px; height: 50px; background: #2c3e50;
            border: 2px solid #89be01; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.05s ease;
        }
        #fire-button {
            right: 40px; bottom: 50px; width: 85px; height: 85px;
            background: radial-gradient(circle, #ff6d4b 0%, #f36d4f 100%);
            border: 3px solid #fff; border-radius: 50%;
            box-shadow: 0 5px 15px rgba(255,109,75,0.6);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #fire-button:active { transform: scale(0.9); background: #f36d4f; }
    </style>
    <!-- Three.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="launcher-screen">
        <div>
            <h1 style="color:#ff6d4b; font-size: 38px; margin: 0 0 10px 0; letter-spacing: 2px;">Fire 3D</h1>
            <p style="color:#cbd5e1; font-size:15px; margin:0;">Eliminate Humanoid Targets In The City</p>
            <button class="start-btn">Play Game</button>
        </div>
    </div>

    <div id="victory-screen">
        <div>
            <h1 style="color:#89be01; font-size: 45px; margin: 0 0 10px 0; letter-spacing: 3px; text-shadow: 0 0 20px rgba(137,190,1,0.6);">BOOYAH!</h1>
            <p style="color:#cbd5e1; font-size:18px; margin:0;">All Enemy Players Eliminated.</p>
            <button class="victory-btn" id="restart-game-btn">Play Again</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="hud-panel">
        <h4 style="margin: 0 0 5px 0; color: #ff6d4b; text-transform: uppercase;">Concrete City Block</h4>
        Kills: <span id="kill-score" style="color: #ff6d4b; font-weight:bold;">0</span> | 
        Enemies: <span id="alive-count" style="color: #89be01; font-weight:bold;">6</span>
    </div>

    <div id="crosshair"></div>

    <div id="hp-wrapper">
        <div id="hp-bar"></div>
        <div id="hp-text">HP 200 / 200</div>
    </div>

    <div id="joystick-bound" class="touch-zone">
        <div id="joystick-thumb"></div>
    </div>
    <div id="fire-button" class="touch-zone">Fire</div>

    <script>
        let scene, camera, renderer, clock;
        let isEngineActive = false;
        
        let moveState = { forward: 0, backward: 0, left: 0, right: 0 };
        let velocity = new THREE.Vector3();
        
        let attackingEnemyBots = [];
        let playerHP = 200, totalEliminations = 0;
        
        let weaponObject;
        let audioCtx = null;
        
        // Balanced Parameters
        const TOTAL_ENEMIES_TO_WIN = 6;
        const ENEMY_SPEED = 4.5;
        const ENEMY_DAMAGE = 25;
        const ENEMY_HEALTH = 100;
        const PLAYER_EYE_LEVEL = 2.0;

        const textureLoader = new THREE.TextureLoader();
        
        // Ground Asphalt Texture
        const groundTexture = textureLoader.load('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=600&auto=format&fit=crop'); 
        groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(30, 30);
        
        // Building Materials Textures
        const buildingTexture1 = textureLoader.load('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=400&auto=format&fit=crop');
        buildingTexture1.wrapS = buildingTexture1.wrapT = THREE.RepeatWrapping;
        const buildingTexture2 = textureLoader.load('https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=400&auto=format&fit=crop');
        buildingTexture2.wrapS = buildingTexture2.wrapT = THREE.RepeatWrapping;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playGunshotSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            let thudOsc = audioCtx.createOscillator();
            let thudGain = audioCtx.createGain();
            thudOsc.type = 'sawtooth';
            thudOsc.frequency.setValueAtTime(180, now);
            thudOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.15);
            let thudFilter = audioCtx.createBiquadFilter();
            thudFilter.type = 'lowpass';
            thudFilter.frequency.setValueAtTime(300, now);
            thudOsc.connect(thudFilter);
            thudFilter.connect(thudGain);
            thudGain.connect(audioCtx.destination);

            let bufferSize = audioCtx.sampleRate * 0.05;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            let noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            let snapFilter = audioCtx.createBiquadFilter();
            snapFilter.type = 'bandpass';
            snapFilter.frequency.setValueAtTime(1200, now);
            let snapGain = audioCtx.createGain();
            snapGain.gain.setValueAtTime(0.6, now);
            snapGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            noiseNode.connect(snapFilter);
            snapFilter.connect(snapGain);
            snapGain.connect(audioCtx.destination);

            let echoOsc = audioCtx.createOscillator();
            let echoGain = audioCtx.createGain();
            echoOsc.type = 'triangle';
            echoOsc.frequency.setValueAtTime(80, now);
            echoGain.gain.setValueAtTime(0.15, now);
            echoGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            echoOsc.connect(echoGain);
            echoGain.connect(audioCtx.destination);

            thudOsc.start(now); thudOsc.stop(now + 0.15);
            noiseNode.start(now);
            echoOsc.start(now); echoOsc.stop(now + 0.4);
        }

        function playHitSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }

        function playDamageSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(90, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = "YXZ";

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a252f); 
            scene.fog = new THREE.FogExp2(0x1a252f, 0.012);
            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xffffff, 0.7)); 
            const sunLight = new THREE.DirectionalLight(0xfff3e0, 0.8); 
            sunLight.position.set(60, 100, 30);
            scene.add(sunLight);

            const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ map: groundTexture, roughness: 0.9 }));
            groundMesh.rotation.x = -Math.PI / 2;
            scene.add(groundMesh);

            // ================= REAL BUILDINGS GENERATION =================
            const totalBuildings = 32;
            const buildingGeometry = new THREE.BoxGeometry(1, 1, 1);
            const realBuildingColors = [0x95a5a6, 0xd5dbdb, 0xbdc3c7, 0x7f8c8d, 0x34495e, 0xa6acaf];

            for (let i = 0; i < totalBuildings; i++) {
                const width = 8 + Math.random() * 12;
                const height = 16 + Math.random() * 26; 
                const depth = 8 + Math.random() * 12;

                const selectedColor = realBuildingColors[Math.floor(Math.random() * realBuildingColors.length)];
                const chosenTexture = Math.random() > 0.5 ? buildingTexture1 : buildingTexture2;
                
                const customTextureInstance = chosenTexture.clone();
                customTextureInstance.needsUpdate = true;
                customTextureInstance.repeat.set(width / 4, height / 4);

                const buildingMaterial = new THREE.MeshStandardMaterial({
                    color: selectedColor,
                    map: customTextureInstance,
                    roughness: 0.6,
                    metalness: 0.2
                });

                const buildingMesh = new THREE.Mesh(buildingGeometry, buildingMaterial);
                buildingMesh.scale.set(width, height, depth);
                
                let bX = (Math.random() - 0.5) * 170;
                let bZ = (Math.random() - 0.5) * 170;
                
                if (Math.abs(bX) < 18) bX += bX >= 0 ? 22 : -22;
                if (Math.abs(bZ) < 18) bZ += bZ >= 0 ? 22 : -22;

                buildingMesh.position.set(bX, height / 2, bZ);
                scene.add(buildingMesh);
            }

            // ================= SINGLE RIGHT HAND PISTOL =================
            const gunGroup = new THREE.Group();
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.75), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 }));
            barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0, -0.2);
            const frameBlock = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.45), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            frameBlock.position.set(0, -0.05, -0.05);
            gunGroup.add(barrel, frameBlock);
            
            gunGroup.position.set(0.25, -0.25, -0.5);
            camera.add(gunGroup);
            scene.add(camera);
            weaponObject = gunGroup;

            document.getElementById('launcher-screen').addEventListener('click', function() {
                this.style.display = 'none';
                isEngineActive = true;
                initAudio();
                if(!('ontouchstart' in window)) { document.body.requestPointerLock(); }
            });

            document.getElementById('restart-game-btn').addEventListener('click', function() {
                document.getElementById('victory-screen').style.display = 'none';
                resetFullMatchState();
            });

            setupControllerSystems();
            spawnInitialWave();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function spawnInitialWave() {
            attackingEnemyBots.forEach(b => scene.remove(b.mesh));
            attackingEnemyBots = [];
            for(let i=0; i < TOTAL_ENEMIES_TO_WIN; i++) { spawnEnemyAgent(); }
            document.getElementById('alive-count').innerText = attackingEnemyBots.length;
        }

        function resetFullMatchState() {
            playerHP = 200;
            totalEliminations = 0;
            document.getElementById('kill-score').innerText = "0";
            document.getElementById('hp-bar').style.width = "100%";
            document.getElementById('hp-text').innerText = "HP 200 / 200";
            camera.position.set(0, PLAYER_EYE_LEVEL, 0);
            camera.rotation.set(0, 0, 0);
            spawnInitialWave();
            isEngineActive = true;
        }

        function handleVictoryCondition() {
            isEngineActive = false;
            document.getElementById('victory-screen').style.display = 'flex';
            if(document.pointerLockElement === document.body) { document.exitPointerLock(); }
        }

        function setupControllerSystems() {
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW' || e.code === 'ArrowUp') moveState.forward = 1;
                if(e.code === 'KeyS' || e.code === 'ArrowDown') moveState.backward = 1;
                if(e.code === 'KeyA' || e.code === 'ArrowLeft') moveState.left = 1;
                if(e.code === 'KeyD' || e.code === 'ArrowRight') moveState.right = 1;
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW' || e.code === 'ArrowUp') moveState.forward = 0;
                if(e.code === 'KeyS' || e.code === 'ArrowDown') moveState.backward = 0;
                if(e.code === 'KeyA' || e.code === 'ArrowLeft') moveState.left = 0;
                if(e.code === 'KeyD' || e.code === 'ArrowRight') moveState.right = 0;
            });
            document.addEventListener('mousemove', (e) => {
                if ((document.pointerLockElement === document.body || isEngineActive) && !('ontouchstart' in window)) {
                    camera.rotation.y -= e.movementX * 0.0025;
                    camera.rotation.x -= e.movementY * 0.0025;
                    camera.rotation.x = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, camera.rotation.x));
                }
            });

            let lookTouchId = null, lastTouchX = 0, lastTouchY = 0;
            window.addEventListener('touchstart', (e) => {
                for(let t=0; t<e.changedTouches.length; t++) {
                    let touch = e.changedTouches[t];
                    if(touch.clientX > window.innerWidth / 2 && lookTouchId === null) {
                        if(touch.target.id === 'fire-button' || touch.target.id === 'restart-game-btn') continue;
                        lookTouchId = touch.identifier; lastTouchX = touch.clientX; lastTouchY = touch.clientY;
                    }
                }
            });
            window.addEventListener('touchmove', (e) => {
                for(let t=0; t<e.touches.length; t++) {
                    let touch = e.touches[t];
                    if(touch.identifier === lookTouchId) {
                        let deltaX = touch.clientX - lastTouchX; let deltaY = touch.clientY - lastTouchY;
                        camera.rotation.y -= deltaX * 0.005; camera.rotation.x -= deltaY * 0.005;
                        camera.rotation.x = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, camera.rotation.x));
                        lastTouchX = touch.clientX; lastTouchY = touch.clientY;
                    }
                }
            });
            window.addEventListener('touchend', (e) => {
                for(let t=0; t<e.changedTouches.length; t++) {
                    if(e.changedTouches[t].identifier === lookTouchId) lookTouchId = null;
                }
            });

            const joyBound = document.getElementById('joystick-bound');
            const joyThumb = document.getElementById('joystick-thumb');
            let joyTouchId = null; let joyCenter = { x: 0, y: 0 };

            joyBound.addEventListener('touchstart', (e) => {
                if(joyTouchId !== null) return;
                const rect = joyBound.getBoundingClientRect();
                joyCenter.x = rect.left + rect.width/2; joyCenter.y = rect.top + rect.height/2;
                joyTouchId = e.targetTouches[0].identifier;
            });
            window.addEventListener('touchmove', (e) => {
                if(joyTouchId === null) return;
                let touch = null;
                for(let i=0; i<e.touches.length; i++) { if(e.touches[i].identifier === joyTouchId) { touch = e.touches[i]; break; } }
                if(!touch) return;

                let dx = touch.clientX - joyCenter.x; let dy = touch.clientY - joyCenter.y;
                let dist = Math.sqrt(dx*dx + dy*dy); let maxDist = 45;
                if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; dist = maxDist; }
                joyThumb.style.transform = `translate(${dx}px, ${dy}px)`;

                let normX = dx / maxDist; let normY = dy / maxDist;
                moveState.forward = normY < -0.2 ? -normY : 0; moveState.backward = normY > 0.2 ? normY : 0;
                moveState.left = normX < -0.2 ? -normX : 0; moveState.right = normX > 0.2 ? normX : 0;
            });
            const resetJoystick = () => {
                joyTouchId = null; joyThumb.style.transform = `translate(0px, 0px)`;
                moveState.forward = moveState.backward = moveState.left = moveState.right = 0;
            };
            joyBound.addEventListener('touchend', resetJoystick); joyBound.addEventListener('touchcancel', resetJoystick);

            const triggerFireAction = () => {
                if(!isEngineActive) return;
                playGunshotSound();
                
                weaponObject.position.z += 0.08; 
                setTimeout(() => { weaponObject.position.z = -0.5; }, 60);

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                
                const targets = attackingEnemyBots.map(b => b.mesh.hitBoxMesh);
                const hits = raycaster.intersectObjects(targets, true);

                if(hits.length > 0) {
                    let rootNode = hits[0].object;
                    while(rootNode.parent && rootNode.parent !== scene) rootNode = rootNode.parent;
                    evaluateDamageHit(rootNode);
                }
            };
            document.getElementById('fire-button').addEventListener('touchstart', (e) => { e.preventDefault(); triggerFireAction(); });
            window.addEventListener('mousedown', (e) => { if(e.button === 0 && !('ontouchstart' in window)) triggerFireAction(); });
        }

        // ================= FIXED ASALI PLAYER GENERATOR =================
        function spawnEnemyAgent() {
            const humanGroup = new THREE.Group();
            
            // Materials
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.6 }); 
            const torsoMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.5 }); 
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1e272e, roughness: 0.7 }); 
            const helmetMat = new THREE.MeshStandardMaterial({ color: 0xff6d4b }); // Fixed syntax error here

            // 1. Torso 
            const torsoMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), torsoMat);
            torsoMesh.position.y = 1.0;
            humanGroup.add(torsoMesh);
            humanGroup.hitBoxMesh = torsoMesh; 

            // 2. Head
            const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), skinMat);
            headMesh.position.y = 1.55;
            humanGroup.add(headMesh);

            // 3. Helmet Indicator
            const helmetMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.5), helmetMat);
            helmetMesh.position.y = 1.75;
            humanGroup.add(helmetMesh);

            // 4. Arms
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.7, 0.15), torsoMat);
            leftArm.position.set(-0.4, 1.0, 0);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.7, 0.15), torsoMat);
            rightArm.position.set(0.4, 1.0, 0);
            humanGroup.add(leftArm, rightArm);

            // 5. Legs
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.6, 0.18), pantsMat);
            leftLeg.position.set(-0.2, 0.3, 0);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.6, 0.18), pantsMat);
            rightLeg.position.set(0.2, 0.3, 0);
            humanGroup.add(leftLeg, rightLeg);

            // Coordinates
            const theta = Math.random() * Math.PI * 2; 
            const distance = 35 + Math.random() * 35; 
            humanGroup.position.set(camera.position.x + Math.cos(theta)*distance, 0, camera.position.z + Math.sin(theta)*distance);

            scene.add(humanGroup);
            attackingEnemyBots.push({ mesh: humanGroup, hp: ENEMY_HEALTH });
        }

        function evaluateDamageHit(botContainer) {
            let agent = attackingEnemyBots.find(b => b.mesh === botContainer);
            if(agent) {
                agent.hp -= 50; 
                playHitSound();
                
                agent.mesh.hitBoxMesh.material.emissive.setHex(0xff0000);
                setTimeout(() => { agent.mesh.hitBoxMesh.material.emissive.setHex(0x000000); }, 100);

                if(agent.hp <= 0) {
                    scene.remove(botContainer);
                    attackingEnemyBots = attackingEnemyBots.filter(b => b.mesh !== botContainer);
                    totalEliminations++;
                    document.getElementById('kill-score').innerText = totalEliminations;
                    document.getElementById('alive-count').innerText = attackingEnemyBots.length;

                    if(attackingEnemyBots.length === 0) {
                        handleVictoryCondition();
                    }
                }
            }
        }

        let damageSoundThrottle = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isEngineActive) {
                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;

                let moveZ = moveState.forward - moveState.backward; let moveX = moveState.right - moveState.left;
                if (moveZ !== 0) velocity.z -= moveZ * 45.0 * delta; if (moveX !== 0) velocity.x -= moveX * 45.0 * delta;

                camera.translateX(-velocity.x * delta); camera.translateZ(velocity.z * delta);
                camera.position.y = PLAYER_EYE_LEVEL;

                if(moveZ !== 0 || moveX !== 0) {
                    let speedFactor = clock.getElapsedTime();
                    weaponObject.position.y = -0.25 + Math.sin(speedFactor * 12) * 0.015;
                    weaponObject.position.x = 0.25 + Math.cos(speedFactor * 6) * 0.01;
                }

                damageSoundThrottle += delta;

                attackingEnemyBots.forEach(bot => {
                    let trackVec = new THREE.Vector3().subVectors(camera.position, bot.mesh.position);
                    trackVec.y = 0; let distance = trackVec.length(); trackVec.normalize();

                    bot.mesh.position.addScaledVector(trackVec, ENEMY_SPEED * delta);
                    bot.mesh.lookAt(camera.position.x, bot.mesh.position.y, camera.position.z);

                    if(distance < 1.85) {
                        playerHP = Math.max(0, playerHP - (ENEMY_DAMAGE * delta));
                        document.getElementById('hp-bar').style.width = `${(playerHP / 200)*100}%`;
                        document.getElementById('hp-text').innerText = `HP ${Math.floor(playerHP)} / 200`;

                        if(damageSoundThrottle > 0.25) { playDamageSound(); damageSoundThrottle = 0; }

                        if(playerHP <= 0) {
                            alert("GAME OVER! Real players squad dominated the sector.");
                            resetFullMatchState();
                        }
                    }
                });
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
